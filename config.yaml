# Configuration for the autonomous research agent

llm:
  # Ollama model to use. Options: qwen2.5:1.5b (recommended for 4GB), qwen2.5:3b
  model: "qwen2.5:1.5b"
  embed_model: "nomic-embed-text"  # Lightweight embedding model (~270MB)
  host: "http://localhost:11434"
  temperature_plan: 0.2
  temperature_synth: 0.5
  max_tokens: 1024  # Lowered from 2048 — Qwen on CPU is slow; smaller outputs = faster steps
  request_timeout: 600  # seconds; CPU inference can be slow
  keep_alive: "30m"  # keep model warm between calls — prevents 30s+ reloads

compression:
  # Optional prompt compression via headroom-ai (github.com/chopratejas/headroom).
  # On a 4 GB Qwen CPU box, prompt tokens dominate wall-time — cutting them
  # 50-90% on tool-heavy turns directly shortens every step.
  # Install: pip install "headroom-ai[all]"
  # If the package is missing this section is silently a no-op.
  enabled: false
  min_input_chars: 2000   # skip compression below this (overhead > savings)
  model_hint: "gpt-4o"    # tokenizer headroom uses for counting (not for inference)
  log_path: "outputs/compression_log.jsonl"

cache:
  enabled: true
  dir: "cache"
  ttl_seconds: 604800  # 7 days

agent:
  max_steps: 500
  max_hours: 16
  checkpoint_every_n_steps: 10
  reflect_every_n_steps: 20
  max_tool_retries: 3

monitor:
  enabled: true
  sample_interval: 30.0
  ram_abort_pct: 95.0
  thermal_abort_c: 95.0  # Abort if any thermal zone exceeds this (Celsius)

tools:
  web_search:
    max_results: 8
    rate_limit_seconds: 3
  arxiv:
    max_results: 20
    sort_by: "relevance"
  pdf_reader:
    max_pages: 50
    chunk_size: 500
    chunk_overlap: 50
    download_dir: "state/pdfs"
  memory:
    index_path: "state/faiss.index"
    metadata_path: "state/metadata.json"
    embedding_dim: 768
    top_k_default: 6
    hybrid_alpha: 0.6  # 1.0 = vector only, 0.0 = BM25 only
  wikipedia:
    lang: "en"
    max_chars: 4000
  web_fetch:
    max_chars: 20000
    timeout: 30
  semantic_scholar:
    max_results: 15
    rate_limit_seconds: 3
  hacker_news:
    max_results: 10
    rate_limit_seconds: 1.0
  rss:
    max_entries: 15
    timeout: 20
  github_search:
    max_results: 10
    rate_limit_seconds: 2.0

tracing:
  enabled: false  # opt-in. Install: pip install arize-phoenix-otel openinference-instrumentation-ollama
  endpoint: "http://localhost:6006/v1/traces"
  project_name: "ollama-local-research-agent"

dashboard:
  port: 5050
  host: "127.0.0.1"

paths:
  state_dir: "state"
  output_dir: "outputs"
  history_dir: "history"
  skills_dir: "skills"
  prompt_file: "prompt.md"
  log_file: "outputs/agent_log.jsonl"
  final_output: "outputs/final.md"
  system_metrics_log: "outputs/system_metrics.jsonl"
  compression_log: "outputs/compression_log.jsonl"
